<svg xmlns="http://www.w3.org/2000/svg" width="820" height="190" viewBox="0 0 820 190" role="img" aria-labelledby="title desc">
  <title id="title">MPIntInv logo</title>
  <desc id="desc">A compression grid with highlighted interval regions next to the MPIntInv wordmark.</desc>
  <defs>
    <linearGradient id="intervalGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6b34b"/>
      <stop offset="100%" stop-color="#e45f3d"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="820" height="190" rx="28" fill="#ffffff"/>

  <g transform="translate(44 20)" filter="url(#softShadow)">
    <rect x="0" y="0" width="150" height="150" rx="22" fill="#f8fafc" stroke="#d7dee8" stroke-width="1.5"/>

    <g transform="translate(27 27)">
      <rect x="0" y="0" width="96" height="96" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.4"/>

      <g fill="url(#intervalGradient)" stroke="#9a3412" stroke-width="1.4">
        <rect x="2" y="2" width="30" height="30" rx="5"/>
        <rect x="2" y="34" width="30" height="30" rx="5"/>
        <rect x="34" y="34" width="30" height="30" rx="5"/>
        <rect x="34" y="66" width="30" height="28" rx="5"/>
        <rect x="66" y="66" width="28" height="28" rx="5"/>
      </g>

      <g stroke="#cbd5e1" stroke-width="1.2">
        <path d="M32 0 V96"/>
        <path d="M64 0 V96"/>
        <path d="M0 32 H96"/>
        <path d="M0 64 H96"/>
      </g>

      <rect x="0" y="0" width="96" height="96" rx="12" fill="none" stroke="#475569" stroke-width="2"/>
    </g>
  </g>

  <g transform="translate(230 51)">
    <text x="0" y="55" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="58" font-weight="800" letter-spacing="0" fill="#172033">MPIntInv</text>
    <text x="4" y="92" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="21" font-weight="520" letter-spacing="0" fill="#475569">Interval invariants for multiparameter persistence</text>
  </g>
</svg>
